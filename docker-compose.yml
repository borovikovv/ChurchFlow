services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: churchflow
      POSTGRES_USER: churchflow
      POSTGRES_PASSWORD: churchflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U churchflow -d churchflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: churchflow
      MINIO_ROOT_PASSWORD: churchflow-local-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
